<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Описание игры - Хаб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            color: #60a5fa;
        }
        .game-header {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            align-items: center;
        }
        .screenshot {
            background: #0f172a;
            border-radius: 1.5rem;
            width: 280px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 1px solid #334155;
        }
        .title-box {
            flex: 1;
        }
        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .description {
            line-height: 1.6;
            margin: 1.5rem 0;
            background: #0f172a;
            padding: 1.2rem;
            border-radius: 1rem;
        }
        .play-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            width: 100%;
        }
        .play-btn:hover {
            filter: brightness(1.05);
            transform: scale(1.01);
        }
        hr {
            margin: 1rem 0;
            border-color: #334155;
        }
        .not-found {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>
<body>
<div class="container" id="gameContainer">
    <a href="index.html" class="back-link">← Назад к списку игр</a>
    <div id="gameContent">
        <!-- динамическое содержимое -->
    </div>
</div>

<script>
    // Та же база игр (можно вынести в отдельный js, но для простоты дублируем)
    const gamesDB = [
        {
            id: "game_001",
            title: "MinerGame",
            shortDesc: "Бесконечный кликер-шахта! Копайте, прокачивайте инструменты, нанимайте шахтёров и зарабатывайте. Перезапускайте шахту с опытом для ещё большего дохода.",
            fullDesc: "Вы единственный надёжный рудокоп в бесконечных глубинах! Начните с голых рук и постройте свою шахту! Ваша цель - копать как можно глубже, слой за слоем, зарабатывая монеты на развитие.  Каждый слой - это новый вызов и новая награда! Покупайте и прокачивайте инструменты от простых лопат и кирок до отбойного молотка и бура. Каждый клик приносит прибыль для новых улучшений! Устали копать в одиночку?  Нанятые шахтёры с инструментами будут работать на вас, принося ещё больше дохода. Достигли максимума? Перезапускайте шахту, и получайте ценный опыт для нового, ещё более прибыльного захода. Каждый цикл - мощнее предыдущего! Это бесконечный симулятор копания и прокачки инструмента, где вы сами задаете темп. Хотите медитативно кликать после работы и учёбы или стратегически планировать развитие своей подземной корпорации - здесь есть и то, и другое. Спускайтесь в шахту, где нет дна, а есть только ваш апгрейд! Какую глубину вы сможете покорить? MinerGame: прокопай самую глубокую шахту!",
            screenshot: "IMG/MinerGameCover.png",
            gameUrl: "https://mrdesert.github.io/MinerGame/"
        },
        {
            id: "game_002",
            title: "HexGame",
            shortDesc: "Игра стратегия",
            fullDesc: "Ролевая игра с процедурной генерацией. Собирай артефакты, сражайся с монстрами и открывай новые заклинания.",
            screenshot: "IMG/HexGameCover.png",
            gameUrl: "https://mrdesert.github.io/HexGame/"
        },
        {
            id: "game_003",
            title: "Удачная рыбалка",
            shortDesc: "Лови рыбу, продавай, зарабатывай, прокачивай удачку, выбирай наживку",
            fullDesc: "Лови рыбу, продавай, зарабатывай, прокачивай удачку, выбирай наживку",
            screenshot: "IMG/FishingCover.png",
            gameUrl: "https://mrdesert.github.io/FishingGame/"
        },
        {
            id: "game_004",
            title: "Угадай число",
            shortDesc: "Головоломка",
            fullDesc: "Расслабляющая головоломка, с угадывание числа",
            screenshot: "IMG/GuessNumberCover.png",
            gameUrl: "https://mrdesert.github.io/MoreGames/"
        }
    ];

    const selectedId = localStorage.getItem('selectedGameId');
    const game = gamesDB.find(g => g.id === selectedId);

    const container = document.getElementById('gameContent');

    if (!game) {
        container.innerHTML = `<div class="not-found"><h2>❌ Игра не найдена</h2><p>Вернитесь на главную и выберите игру.</p><a href="index.html" style="color:#60a5fa;">На главную</a></div>`;
    } else {
        container.innerHTML = `
            <div class="game-header">
                <div class="game-img">
    <img class="screenshot" src="${game.screenshot}" alt="${game.title}" 
         style="width:100%; height:100%; object-fit:cover;" 
         onerror="this.src='https://via.placeholder.com/300x160?text=No+Image'">
</div>
                <div class="title-box">
                    <div class="game-title">${game.title}</div>
                    <div style="color:#94a3b8;">${game.shortDesc}</div>
                </div>
            </div>
            <div class="description">
                <strong>📝 Полное описание:</strong><br><br>
                ${game.fullDesc}
            </div>
            <button class="play-btn" id="startGameBtn">🎮 ИГРАТЬ →</button>
            <hr>
            <small style="color:#64748b;">© by MrDesert</small>
        `;

        document.getElementById('startGameBtn').addEventListener('click', () => {
            // Передаём URL игры и название для заголовка на странице игры
            localStorage.setItem('gameToPlayUrl', game.gameUrl);
            localStorage.setItem('gameToPlayTitle', game.title);
            window.location.href = 'play.html';
        });
    }
</script>
</body>
</html>
