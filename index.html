<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой хаб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            padding: 2rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .game-card {
            background: #1e293b;
            border-radius: 1.5rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .game-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(145deg, #334155, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .game-info {
            padding: 1.2rem;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .game-desc {
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: #2563eb;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 DesertBox - Игровой Хаб </h1>
    <div class="subtitle">Выбери игру, узнай подробности и начни играть</div>

    <div class="games-grid" id="gamesGrid"></div>
    <footer>© by MrDesert v0.0.0.0.1 Хаб игр — все игры доступны через iframe</footer>
</div>

<script>
    // БАЗА ДАННЫХ ИГР (можно расширять)
    const gamesDB = [
        {
            id: "game_001",
            title: "MinerGame",
            shortDesc: "Бесконечный кликер-шахта! Копайте, прокачивайте инструменты, нанимайте шахтёров и зарабатывайте. Перезапускайте шахту с опытом для ещё большего дохода.",
            fullDesc: "Вы единственный надёжный рудокоп в бесконечных глубинах! Начните с голых рук и постройте свою шахту! Ваша цель - копать как можно глубже, слой за слоем, зарабатывая монеты на развитие.  Каждый слой - это новый вызов и новая награда! Покупайте и прокачивайте инструменты от простых лопат и кирок до отбойного молотка и бура. Каждый клик приносит прибыль для новых улучшений! Устали копать в одиночку?  Нанятые шахтёры с инструментами будут работать на вас, принося ещё больше дохода. Достигли максимума? Перезапускайте шахту, и получайте ценный опыт для нового, ещё более прибыльного захода. Каждый цикл - мощнее предыдущего! Это бесконечный симулятор копания и прокачки инструмента, где вы сами задаете темп. Хотите медитативно кликать после работы и учёбы или стратегически планировать развитие своей подземной корпорации - здесь есть и то, и другое. Спускайтесь в шахту, где нет дна, а есть только ваш апгрейд! Какую глубину вы сможете покорить? MinerGame: прокопай самую глубокую шахту!",
            screenshot: "IMG/MinerGameCover.png",
            gameUrl: "https://mrdesert.github.io/MinerGame/"  // ЗАМЕНИТЕ на реальную ссылку вашей игры
        },
        {
            id: "game_002",
            title: "HexGame",
            shortDesc: "Игра стратегия, захватывай территорию и сражайся!",
            fullDesc: "Стратегия с процедурной генерацией. Захватывай территории, сражайся с врагами и побеждай.",
            screenshot: "IMG/HexGameCover.png",
            gameUrl: "https://mrdesert.github.io/HexGame/"
        },
        {
            id: "game_003",
            title: "Удачная рыбалка",
            shortDesc: "Лови рыбу, продавай, зарабатывай, прокачивай удачку, выбирай наживку",
            fullDesc: "Лови рыбу, продавай, зарабатывай, прокачивай удачку, выбирай наживку",
            screenshot: "IMG/FishingCover.png",
            gameUrl: "https://mrdesert.github.io/FishingGame/"
        },
        {
            id: "game_004",
            title: "Угадай число",
            shortDesc: "Головоломка",
            fullDesc: "Расслабляющая головоломка, с угадывание числа",
            screenshot: "IMG/GuessNumberCover.png",
            gameUrl: "https://mrdesert.github.io/MoreGames/"
        }
    ];

    function renderGames() {
        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = '';

        gamesDB.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-img">
                    <img src="${game.screenshot}" alt="${game.title}" 
                        style="width:100%; height:100%; object-fit:cover;" 
                        onerror="this.src='https://via.placeholder.com/300x160?text=No+Image'">
                </div>
                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-desc">${game.shortDesc}</div>
                    <button class="btn" data-id="${game.id}">📖 Подробнее</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // Вешаем обработчики на кнопки
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const gameId = btn.getAttribute('data-id');
                // Сохраняем выбранную игру и переходим на страницу описания
                localStorage.setItem('selectedGameId', gameId);
                window.location.href = 'game.html';
            });
        });
    }

    renderGames();
</script>
</body>
</html>
