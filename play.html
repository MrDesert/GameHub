<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой плеер - Хаб</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="playBody">
<div class="top-bar">
    <div class="play-nav-buttons">
        <a href="#" class="nav-btn" id="allGamesLink">🎮 Все игры</a>
        <a href="#" class="nav-btn" id="gameDescLink">📖 Описание игры</a>
    </div>
    <div class="game-title-header" id="gameTitleSpan">Игра</div>
    <a href="#" class="back-link" id="backLink" style="visibility: hidden;">← Назад</a>
</div>

<div class="game-layout">
    <!-- ИГРА -->
    <div class="game-area">
        <iframe id="gameIframe" class="game-frame" src="about:blank" allowfullscreen></iframe>
        <!-- Реклама (поверх игры) -->
        <iframe id="adOverlay" src="ad.html"></iframe>
    </div>
   <script>
    const gameIframe = document.getElementById('gameIframe');
    const adOverlay = document.getElementById('adOverlay');
    let isAdShowing = false; // ← ДОБАВЛЯЕМ ФЛАГ

    window.addEventListener('message', (event) => {
        if (event.source === window) {
            console.log("Родитель: сообщение от себя, игнорирую");
            return;
        }

        const data = event.data;
        const type = data?.type;
        const typeAd = data?.typeAd;
        const tipeGive = data?.tipeGive;

        if (type === 'start') {
            // === ЕСЛИ РЕКЛАМА УЖЕ ПОКАЗЫВАЕТСЯ — ИГНОРИРУЕМ ===
            if (isAdShowing) {
                console.warn("Реклама уже показывается, игнорирую повторный start");
                return;
            }

            if (typeAd === 'rewarded') {
                isAdShowing = true; // ← УСТАНАВЛИВАЕМ ФЛАГ
                console.log("Показываю рекламу, награда:", tipeGive);
                
                adOverlay.contentWindow.postMessage({
                    type: type,
                    typeAd: typeAd,
                    tipeGive: tipeGive
                }, '*');
                showAdRewarded();
            }
        } else if (type === 'finish') {
            console.log("На главную пришло реклама на финише", tipeGive);
            gameIframe.contentWindow.postMessage({
                    type: type,
                    typeAd: typeAd,
                    tipeGive: tipeGive
            }, '*');
            isAdShowing = false; // ← СБРАСЫВАЕМ ФЛАГ
            adOverlay.style.display = 'none';
        }
    });

    function showAdRewarded() {
        adOverlay.style.display = 'block';
        // НЕ ПЕРЕЗАГРУЖАЙ iframe!
        // adOverlay.src = adOverlay.src;
    }

    function hideAd() {
        adOverlay.style.display = 'none';
    }
</script>

    <!-- БАННЕР СПРАВА -->
    <div class="ad-sidebar">
        <div class="ad-label">Реклама</div>
        <div class="banner-content">
            <div class="fake-ad">
                🧨 <strong>Ваша реклама</strong><br>
                <span style="font-size:11px;">Текст баннера 300x250</span><br>
                <button onclick="alert('Клик по рекламе (демо)')">Узнать больше</button>
            </div>
        </div>
    </div>
</div>

<footer>© by MrDesert v0.0.0.0.3 DesertBox - Хаб игр</footer>
<script src="script.js"></script>
</body>
</html>
