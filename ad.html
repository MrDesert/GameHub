<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Реклама</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        /* Контейнер видео на весь экран */
        .video-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Таймер — поверх видео, правый верхний угол */
        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        /* Кнопка — появляется на месте таймера */
        #closeBtn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 24px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transition: background 0.2s, transform 0.2s;
            animation: pulse 1.5s ease-in-out infinite;
        }
        #closeBtn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        /* Анимация пульсации для кнопки */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(76, 175, 80, 0.8); }
        }
        
        /* Метка "Реклама" — левый верхний угол */
        .label {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <a id="vid1" href="http://127.0.0.1:3000/GameHub/play.html?id=minergame" target="_blank"><video id="adVideo1" muted playsinline>
            <source src="VIDEO/MinerGameTrailer.mp4" type="video/mp4">
        </video></a>
        
        <a id="vid2" href="https://desertbox.ru/play.html?id=CritOrQuit" target="_blank"><video id="adVideo2" muted playsinline>
            <source src="VIDEO/CritOrQuitTrailer.mp4" type="video/mp4">
        </video></a>

        <div id="timer"></div>
        <button id="closeBtn">X Получить награду</button>
        <div class="label">Реклама</div>
    </div>

    <script>
        const video1 = document.getElementById('adVideo1');
        const video2 = document.getElementById('adVideo2');
        const timer = document.getElementById('timer');
        const closeBtn = document.getElementById('closeBtn');
        const rndVid = Math.floor(Math.random()*2);
        
        let seconds = 10;
        let timerFinished = false;
        
        if(rndVid === 0){
        document.getElementById("vid2").hidden = true;
        // Запускаем видео1
        video1.play().catch(() => {
            timer.textContent = '▶ Нажмите для запуска';
        });
        } else {
        document.getElementById("vid1").hidden = true;
                // Запускаем видео2
        video2.play().catch(() => {
            timer.textContent = '▶ Нажмите для запуска';
        });
        }
        
        // Таймер
        const interval = setInterval(() => {
            timer.textContent = '⏱ ' + seconds;
            seconds--;
            if (seconds <= 0) {
                clearInterval(interval);
                timerFinished = true;
                timer.style.display = 'none';
                closeBtn.style.display = 'block';
            }
        }, 1000);
        
        // Блокируем клавиши (пробел и escape)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Escape') e.preventDefault();
        });
        
        // Блокируем контекстное меню (ПКМ)
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        let typeAd;
        let tipeGive;

        window.addEventListener('message', (event) => {

            typeAd = event.data.typeAd;
            tipeGive = event.data.tipeGive;
        });

        // Когда видео закончилось (запасной вариант)
        video1.onended = () => {
            if (!timerFinished) {
                clearInterval(interval);
                timerFinished = true;
                timer.style.display = 'none';
                closeBtn.style.display = 'block';
            }
        };
        
        // При клике на "Получить награду"
        closeBtn.onclick = () => {window.parent.postMessage({
                    typeAd: typeAd,
                    tipeGive: tipeGive
                }, '*');
        };
    </script>
</body>
</html>
