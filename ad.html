<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Реклама</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        /* Контейнер видео на весь экран */
        .video-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Таймер — поверх видео, правый верхний угол */
        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        /* Кнопка — появляется на месте таймера */
        #closeBtn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 24px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transition: background 0.2s, transform 0.2s;
            animation: pulse 1.5s ease-in-out infinite;
        }
        #closeBtn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        /* Анимация пульсации для кнопки */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(76, 175, 80, 0.8); }
        }
        
        /* Метка "Реклама" — левый верхний угол */
        .label {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 10;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <a id="vid1" href="http://127.0.0.1:3000/GameHub/play.html?id=minergame" target="_blank"><video id="adVideo1" muted playsinline>
            <source src="VIDEO/MinerGameTrailer.mp4" type="video/mp4">
        </video></a>
        
        <a id="vid2" href="https://desertbox.ru/play.html?id=CritOrQuit" target="_blank"><video id="adVideo2" muted playsinline>
            <source src="VIDEO/CritOrQuitTrailer.mp4" type="video/mp4">
        </video></a>

        <div id="timer"></div>
        <button id="closeBtn">X Получить награду</button>
        <div class="label">Реклама</div>
    </div>

<script>
        // === ЭЛЕМЕНТЫ ===
        const video1 = document.getElementById('adVideo1');
        const video2 = document.getElementById('adVideo2');
        const timer = document.getElementById('timer');
        const closeBtn = document.getElementById('closeBtn');
        
        // === ПЕРЕМЕННЫЕ ===
        let interval = null;
        let seconds = 10;
        let timerFinished = false;
        let isPlaying = false;
        let rewardData = null; // { typeAd, tipeGive }
        
        // === БЛОКИРОВКА КЛАВИШ (постоянная) ===
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Escape') e.preventDefault();
        });
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // === ОБРАБОТЧИК СООБЩЕНИЙ (ОДИН РАЗ) ===
        window.addEventListener('message', function handler(event) {
            const data = event.data;
            
            console.log("ad.html получил:", data);
            
            // Только если это старт и реклама не идёт
            if (data && data.type === "start" && !isPlaying) {
                rewardData = {
                    typeAd: data.typeAd,
                    tipeGive: data.tipeGive
                };
                console.log("Запускаю рекламу, награда:", rewardData);
                startAd();
            }
        }, {once: true});
        
        // === ЗАПУСК РЕКЛАМЫ ===
        function startAd() {
            isPlaying = true;
            timerFinished = false;
            seconds = 10;
            
            // Очищаем старый интервал
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
            
            // Показываем таймер, прячем кнопку
            timer.style.display = 'block';
            timer.textContent = '⏱ ' + seconds;
            closeBtn.style.display = 'none';
            
            // Выбираем видео
            const rndVid = Math.floor(Math.random() * 2);
            if (rndVid === 0) {
                video2.hidden = true;
                video1.hidden = false;
                video1.currentTime = 0;
                video1.play().catch(() => {});
            } else {
                video1.hidden = true;
                video2.hidden = false;
                video2.currentTime = 0;
                video2.play().catch(() => {});
            }
            
            // Таймер
            interval = setInterval(() => {
                seconds--;
                timer.textContent = '⏱ ' + seconds;
                
                if (seconds <= 0) {
                    clearInterval(interval);
                    interval = null;
                    timerFinished = true;
                    timer.style.display = 'none';
                    closeBtn.style.display = 'block';
                    isPlaying = false;
                }
            }, 1000);
            
            // Когда видео закончилось
            video1.onended = () => { if (!timerFinished) finishAd(); };
            video2.onended = () => { if (!timerFinished) finishAd(); };
        }
        
        // === ЗАВЕРШЕНИЕ РЕКЛАМЫ (если видео закончилось раньше таймера) ===
        function finishAd() {
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
            timerFinished = true;
            timer.style.display = 'none';
            closeBtn.style.display = 'block';
            isPlaying = false;
        }
        
        // === КНОПКА "ПОЛУЧИТЬ НАГРАДУ" ===
        closeBtn.onclick = function() {
            console.log("Нажата кнопка, отправляю finish с:", rewardData);
            
            window.parent.postMessage({
                type: "finish",
                typeAd: rewardData ? rewardData.typeAd : null,
                tipeGive: rewardData ? rewardData.tipeGive : null
            }, '*');
            
            // Сброс
            isPlaying = false;
            rewardData = null;
            closeBtn.style.display = 'none';
        };
    </script>
</body>
</html>
